          <pre class="bg-gray-900 text-gray-100 rounded-lg p-4 overflow-x-auto my-4 text-sm"><code># Dockerfile
FROM node:20-alpine AS builder
WORKDIR /app
COPY package*.json ./
RUN npm ci --only=production
COPY . .
RUN npm run build

FROM nginx:alpine
COPY --from=builder /app/dist /usr/share/nginx/html
EXPOSE 80</code></pre>
          <blockquote class="border-l-4 border-blue-500 bg-blue-50 p-4 my-6 not-italic"><p>掌握 Docker 的基本用法，是前端开发者进阶的必经之路。</p></blockquote>
        `
      },
    };

    // ===== Utility Functions =====
    function getAllTags() {
      const set = new Set();
      POSTS.forEach(p => p.tags.forEach(t => set.add(t)));
      return Array.from(set).sort();
    }

    function getPostsByTag(tag) {
      return POSTS.filter(p => p.tags.includes(tag));
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== Render Functions =====
    function renderPostCard(post) {
      return `
        <article class="card-hover bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition-all duration-300 overflow-hidden group cursor-pointer" onclick="window.location.hash='#/post/${post.id}'">
          <div class="h-40 bg-gradient-to-br from-blue-100 to-emerald-100 flex items-center justify-center group-hover:from-blue-200 group-hover:to-emerald-200 transition-all duration-300">
            <span class="text-5xl">${post.cover}</span>
          </div>
          <div class="p-5">
            <h3 class="font-bold text-gray-900 mb-2 group-hover:text-blue-600 transition-colors line-clamp-2">${escapeHtml(post.title)}</h3>
            <p class="text-sm text-gray-500 mb-3 line-clamp-2">${escapeHtml(post.excerpt)}</p>
            <div class="flex items-center justify-between">
              <div class="flex flex-wrap gap-1">
                ${post.tags.slice(0, 2).map(t => `<span class="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded">${escapeHtml(t)}</span>`).join('')}
              </div>
              <span class="text-xs text-gray-400">${post.date}</span>
            </div>
          </div>
        </article>
      `;
    }

    function renderListCard(post) {
      return `
        <article class="card-hover bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition-all duration-300 p-6 group cursor-pointer" onclick="window.location.hash='#/post/${post.id}'">
          <div class="flex flex-col sm:flex-row sm:items-start gap-4">
            <div class="flex-1 min-w-0">
              <h3 class="text-lg font-bold text-gray-900 mb-2 group-hover:text-blue-600 transition-colors">${escapeHtml(post.title)}</h3>
              <p class="text-gray-500 text-sm mb-3 line-clamp-2">${escapeHtml(post.excerpt)}</p>
              <div class="flex flex-wrap items-center gap-3">
                <div class="flex flex-wrap gap-1">
                  ${post.tags.map(t => `<span class="text-xs px-2 py-0.5 bg-blue-50 text-blue-600 rounded cursor-pointer hover:bg-blue-100 transition-colors" onclick="event.stopPropagation(); window.location.hash='#/tag/${t}'">#${escapeHtml(t)}</span>`).join('')}
                </div>
                <span class="text-xs text-gray-400">${post.readTime}</span>
                <span class="text-xs text-gray-400">${post.date}</span>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderTagBadges(tags, activeTag) {
      return tags.map(t => `
        <button class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${activeTag === t ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-blue-100 text-blue-700 hover:bg-blue-200'} cursor-pointer transition-colors duration-200" onclick="window.location.hash='#/tag/${t}'">${escapeHtml(t)}</button>
      `).join('');
    }

    // ===== Page: Home =====
    function renderHome(activeTag) {
      const allTags = getAllTags();
      const featuredPosts = POSTS.slice(0, 3);
      const listPosts = activeTag ? getPostsByTag(activeTag) : POSTS.slice(3);
      const isTagPage = !!activeTag;

      return `
        ${isTagPage ? `
          <div class="mb-8">
            <button onclick="window.location.hash='#/'" class="flex items-center gap-2 text-sm text-gray-500 hover:text-blue-600 transition-colors mb-4" aria-label="返回首页">
              <svg class="w-4 h-4 group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
              返回
            </button>
            <h1 class="text-2xl font-bold mb-2">
              <span class="text-blue-600">#${escapeHtml(activeTag)}</span>
            </h1>
            <p class="text-gray-500">共 <strong class="text-gray-700">${listPosts.length}</strong> 篇文章</p>
          </div>
        ` : ''}

        ${!isTagPage ? `
          <section class="mb-12 animate-fade-in-up">
            <div class="bg-gradient-to-br from-blue-600 via-blue-700 to-blue-900 rounded-2xl p-8 md:p-12 text-white relative overflow-hidden">
              <div class="absolute inset-0 opacity-10">
                <svg class="w-full h-full" viewBox="0 0 400 400"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/></pattern></defs><rect width="400" height="400" fill="url(#grid)"/></svg>
              </div>
              <div class="relative z-10">
              <h1 class="text-3xl md:text-4xl font-bold mb-4 tracking-tight">探索技术，记录成长</h1>
              <p class="text-blue-100 text-lg max-w-2xl leading-relaxed">King Cobra 的技术博客，记录前端、后端、DevOps 的工程实践与思考。</p>
                <div class="flex flex-wrap gap-3 mt-6">
                  <span class="px-4 py-2 bg-white/20 backdrop-blur-sm rounded-full text-sm font-medium">${POSTS.length} 篇文章</span>
                  <span class="px-4 py-2 bg-white/20 backdrop-blur-sm rounded-full text-sm font-medium">${allTags.length} 个标签</span>
                  <span class="px-4 py-2 bg-white/20 backdrop-blur-sm rounded-full text-sm font-medium">持续更新中</span>
                </div>
              </div>
            </div>
          </section>

          <section class="mb-8">
            <div class="flex flex-wrap items-center gap-2">
              <span class="text-sm font-medium text-gray-500 mr-2">筛选标签：</span>
              <button class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-600 text-white hover:bg-blue-700 cursor-pointer transition-colors duration-200" onclick="window.location.hash='#/'">全部</button>
              ${renderTagBadges(allTags, activeTag)}
            </div>
          </section>
        ` : ''}

        ${!isTagPage ? `
          <section class="mb-12">
            <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
              <span class="w-1 h-6 bg-blue-500 rounded-full"></span>推荐文章
            </h2>
            <div class="grid md:grid-cols-3 gap-6">
              ${featuredPosts.map(renderPostCard).join('')}
            </div>
          </section>
        ` : ''}

        <section>
          <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
            <span class="w-1 h-6 ${isTagPage ? 'bg-blue-500' : 'bg-emerald-500'} rounded-full"></span>
            ${isTagPage ? '相关文章' : '最新文章'}
          </h2>
          <div class="space-y-4">
            ${listPosts.length > 0 ? listPosts.map(renderListCard).join('') : '<div class="text-center py-16"><svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p class="text-gray-500">暂无文章</p></div>'}
          </div>
        </section>
      `;
    }

    // ===== Page: Post Detail =====
    function renderPost(id) {
      const article = ARTICLES[id];
      const post = POSTS.find(p => p.id === id);
      if (!article || !post) return '<div class="text-center py-16"><p class="text-gray-500">文章不存在</p><a href="#/" class="text-blue-600 hover:underline mt-4 inline-block">返回首页</a></div>';

      const relatedPosts = POSTS.filter(p => p.id !== id && p.tags.some(t => post.tags.includes(t))).slice(0, 3);

      return `
        <button onclick="window.history.back()" class="flex items-center gap-2 text-sm text-gray-500 hover:text-blue-600 transition-colors mb-6" aria-label="返回上一页">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          返回
        </button>

        <article class="mb-12">
          <div class="flex flex-wrap items-center gap-3 mb-6 text-sm text-gray-400">
            <span>${post.date}</span><span>·</span><span>${post.readTime}</span><span>·</span><span>By ${post.author}</span>
          </div>
          <h1 class="text-3xl md:text-4xl font-bold mb-4 leading-tight tracking-tight">${escapeHtml(post.title)}</h1>
          <p class="text-lg text-gray-500 mb-6 leading-relaxed">${escapeHtml(post.excerpt)}</p>
          <div class="flex flex-wrap gap-2 mb-8">
            ${post.tags.map(t => `<button class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-100 text-blue-700 hover:bg-blue-200 cursor-pointer transition-colors duration-200" onclick="window.location.hash='#/tag/${t}'">#${escapeHtml(t)}</button>`).join('')}
          </div>
          <div class="border-t border-gray-200"></div>
        </article>

        <section class="prose-custom mb-12 text-gray-700 leading-relaxed space-y-6 text-base">
          ${article.content.replace(/<h[1-6]/g, '<h$1 class="text-2xl font-bold text-gray-900 mt-8 mb-4 tracking-tight scroll-mt-20"').replace(/<p class="text-lg/g, '<p class="mb-6"')}
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-12">
          <h3 class="font-bold text-gray-900 mb-4">浏览所有标签</h3>
          <div class="flex flex-wrap gap-2">
            ${renderTagBadges(getAllTags(), '')}
          </div>
        </section>

        ${relatedPosts.length > 0 ? `
          <section class="mb-12">
            <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
              <span class="w-1 h-6 bg-blue-500 rounded-full"></span>相关文章
            </h2>
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              ${relatedPosts.map(p => `
                <article class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition-all duration-300 p-5 cursor-pointer group" onclick="window.location.hash='#/post/${p.id}'">
                  <h3 class="font-semibold text-gray-900 mb-2 group-hover:text-blue-600 transition-colors line-clamp-2">${escapeHtml(p.title)}</h3>
                  <p class="text-sm text-gray-500 line-clamp-2 mb-3">${escapeHtml(p.excerpt)}</p>
                  <span class="text-xs text-gray-400">${p.date}</span>
                </article>
              `).join('')}
            </div>
          </section>
        ` : ''}
      `;
    }

    // ===== Page: About =====
    function renderAbout() {
      return `
        <section class="mb-12">
          <div class="text-center mb-10">
            <div class="w-24 h-24 mx-auto mb-6 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-full flex items-center justify-center text-white text-3xl font-bold shadow-lg">博</div>
            <h1 class="text-3xl md:text-4xl font-bold mb-4 tracking-tight">关于这个博客</h1>
            <p class="text-lg text-gray-500 max-w-2xl mx-auto leading-relaxed">记录学习历程，分享技术心得，与社区共同成长。</p>
          </div>
        </section>

        <div class="grid md:grid-cols-3 gap-8">
          <div class="md:col-span-2 space-y-8">
            <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
              <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2"><span class="w-1 h-6 bg-blue-500 rounded-full"></span>写在前面</h2>
              <div class="space-y-4 text-gray-600 leading-relaxed">
                <p>你好！欢迎来到我的技术博客。这里是我记录技术学习、分享项目经验的个人空间。</p>
                <p>我相信<strong class="text-gray-900">"输出是最好的学习方式"</strong>。通过写作，我能更系统地整理思路，发现自己理解上的盲区，同时也希望能帮助到正在学习相关技术的朋友。</p>
                <p>这个博客主要关注 <strong class="text-gray-900">前端开发</strong>、<strong class="text-gray-900">后端架构</strong>、<strong class="text-gray-900">DevOps</strong> 以及 <strong class="text-gray-900">工程实践</strong> 等领域。</p>
              </div>
            </section>

            <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
              <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2"><span class="w-1 h-6 bg-emerald-500 rounded-full"></span>技术栈</h2>
              <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                ${['TypeScript', 'React', 'Vue', 'Node.js', 'Astro', 'Tailwind CSS', 'Docker', 'PostgreSQL', 'Redis'].map(tech => `
                  <div class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg hover:bg-blue-50 hover:border-blue-200 transition-colors border border-gray-100">
                    <svg class="w-4 h-4 text-blue-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                    <span class="text-sm font-medium text-gray-700">${tech}</span>
                  </div>
                `).join('')}
              </div>
            </section>
          </div>

          <div class="space-y-6">
            <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
              <h3 class="font-bold text-gray-900 mb-4">联系方式</h3>
              <div class="space-y-3">
                <a href="mailto:hello@example.com" class="flex items-center gap-3 text-sm text-gray-600 hover:text-blue-600 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>hello@example.com</a>
                <a href="https://github.com/k4xus" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 text-sm text-gray-600 hover:text-blue-600 transition-colors" aria-label="GitHub profile"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>GitHub</a>
              </div>
            </section>
            <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
              <h3 class="font-bold text-gray-900 mb-4">博客统计</h3>
              <div class="space-y-4">
                <div class="flex justify-between"><span class="text-sm text-gray-500">文章数</span><span class="text-lg font-bold">${POSTS.length}</span></div>
                <div class="flex justify-between"><span class="text-sm text-gray-500">标签数</span><span class="text-lg font-bold">${getAllTags().length}</span></div>
                <div class="flex justify-between"><span class="text-sm text-gray-500">最近更新</span><span class="text-sm font-medium">${POSTS[0].date}</span></div>
              </div>
            </section>
          </div>
        </div>
      `;
    }

    // ===== Router =====
    function render() {
      const hash = window.location.hash || '#/';
      const main = document.getElementById('main-content');

      // Update nav active state
      document.querySelectorAll('[data-nav]').forEach(el => {
        const nav = el.getAttribute('data-nav');
        if (nav === 'home' && (hash === '#/' || hash.startsWith('#/post') || hash.startsWith('#/tag'))) {
          el.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-colors text-blue-700 bg-blue-50';
        } else if (nav === 'about' && hash === '#/about') {
          el.className = 'px-4 py-2 rounded-lg text-sm font-medium transition-colors text-blue-700 bg-blue-50';
        } else {
          el.className = 'px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition-colors';
        }
      });

      let page, title;
      if (hash === '#/' || hash === '#') {
        page = renderHome(null);
        title = 'TechBlog — 探索技术，记录成长';
      } else if (hash.startsWith('#/post/')) {
        const id = hash.replace('#/post/', '');
        page = renderPost(id);
        const post = POSTS.find(p => p.id === id);
        title = post ? `${post.title} — TechBlog` : '文章不存在 — TechBlog';
      } else if (hash.startsWith('#/tag/')) {
        const tag = hash.replace('#/tag/', '');
        page = renderHome(unescape(tag));
        title = `#${tag} — TechBlog`;
      } else if (hash === '#/about') {
        page = renderAbout();
        title = '关于 — TechBlog';
      } else {
        page = renderHome(null);
        title = 'TechBlog — 探索技术，记录成长';
      }

      main.innerHTML = `<div class="animate-fade-in-up">${page}</div>`;
      document.title = title;
      window.scrollTo(0, 0);
    }

    window.addEventListener('hashchange', render);
    window.addEventListener('DOMContentLoaded', render);

    // Close mobile menu on link click
    document.addEventListener('click', (e) => {
      const mobileMenu = document.getElementById('mobile-menu');
      if (mobileMenu && !mobileMenu.classList.contains('hidden') && e.target.closest('a')) {
        mobileMenu.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
