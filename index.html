          <div class="mb-12 animate-fade-in-up">
            <button onclick="window.location.hash='#/'" class="flex items-center gap-2 text-sm text-muted hover:text-text transition-colors mb-4 group" aria-label="返回首页">
              <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
              返回
            </button>
            <h1 class="text-4xl md:text-5xl font-bold mb-2"><span class="text-gradient">#${escapeHtml(activeTag)}</span></h1>
            <p class="text-muted">共 <strong class="text-text">${listPosts.length}</strong> 篇文章</p>
          </div>
        ` : ''}

        ${!isTagPage ? `
          <section class="mb-16 animate-fade-in-up stagger-1">
            <div class="relative rounded-2xl overflow-hidden border border-border p-8 md:p-12">
              <div class="absolute inset-0 bg-gradient-to-br from-purple-600/20 via-cyan-600/10 to-pink-600/20 animate-pulse-slow"></div>
              <div class="absolute -top-24 -right-24 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl"></div>
              <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-cyan-500/10 rounded-full blur-3xl"></div>
              <div class="relative z-10">
                <p class="text-purple-400 font-mono text-sm mb-3">const blog = new Blog('King Cobra');</p>
                <h1 class="text-3xl md:text-5xl font-bold mb-6 tracking-tight leading-tight">Code, create, <span class="text-gradient">conquer.</span></h1>
                <p class="text-muted text-lg max-w-2xl leading-relaxed mb-8">King Cobra 的技术博客，记录前端、后端、DevOps 的工程实践与思考。</p>
                <div class="flex flex-wrap gap-3">
                  <span class="px-4 py-2 bg-surface border border-border rounded-full text-sm text-muted">${POSTS.length} 文章</span>
                  <span class="px-4 py-2 bg-surface border border-border rounded-full text-sm text-muted">${allTags.length} 标签</span>
                  <span class="px-4 py-2 bg-surface border border-border rounded-full text-sm text-muted">持续更新</span>
                </div>
              </div>
            </div>
          </section>

          <section class="mb-12 animate-fade-in-up stagger-2">
            <div class="flex flex-wrap items-center gap-2">
              <span class="text-xs font-mono text-muted uppercase tracking-wider mr-2">tags:</span>
              <button class="px-3 py-1 rounded-full text-xs font-medium font-mono border border-border text-muted hover:tag-hover transition-all duration-300 cursor-pointer bg-purple-500/10 border-purple-500 text-purple-400" onclick="window.location.hash='#/'">all</button>
              ${allTags.map(t => renderTagBadge(t, activeTag)).join('')}
            </div>
          </section>
        ` : ''}

        ${!isTagPage ? `
          <section class="mb-16 animate-fade-in-up stagger-3">
            <h2 class="text-xs font-mono text-muted uppercase tracking-wider mb-6 flex items-center gap-2"><span class="w-1 h-4 bg-purple-500 rounded-full"></span>featured</h2>
            <div class="grid md:grid-cols-3 gap-6">
              ${featuredPosts.map(p => `
                <article class="card-hover bg-surface border border-border rounded-xl overflow-hidden cursor-pointer group" onclick="window.location.hash='#/post/${p.id}'">
                  <div class="h-40 bg-gradient-to-br ${p.color} flex items-center justify-center group-hover:scale-105 transition-transform duration-500">
                    <span class="text-5xl">${p.icon}</span>
                  </div>
                  <div class="p-5">
                    <h3 class="font-bold text-text mb-2 group-hover:text-purple-400 transition-colors line-clamp-2">${escapeHtml(p.title)}</h3>
                    <p class="text-xs text-muted mb-3 line-clamp-2">${escapeHtml(p.excerpt)}</p>
                    <div class="flex items-center justify-between">
                      <div class="flex flex-wrap gap-1">${p.tags.slice(0, 2).map(t => `<span class="text-xs px-2 py-0.5 bg-surface text-muted rounded font-mono">${escapeHtml(t)}</span>`).join('')}</div>
                      <span class="text-xs text-muted">${p.date}</span>
                    </div>
                  </div>
                </article>
              `).join('')}
            </div>
          </section>
        ` : ''}

        <section class="animate-fade-in-up stagger-4">
          <h2 class="text-xs font-mono text-muted uppercase tracking-wider mb-6 flex items-center gap-2"><span class="w-1 h-4 ${isTagPage ? 'bg-purple-500' : 'bg-cyan-500'} rounded-full"></span>${isTagPage ? 'filter: ' + escapeHtml(activeTag) : 'recent'}</h2>
          <div class="space-y-4">
            ${listPosts.length > 0 ? listPosts.map(p => `
              <article class="card-hover bg-surface border border-border rounded-xl p-6 cursor-pointer group flex flex-col sm:flex-row sm:items-start gap-4" onclick="window.location.hash='#/post/${p.id}'">
                <div class="flex-1 min-w-0">
                  <h3 class="text-lg font-bold text-text mb-2 group-hover:text-purple-400 transition-colors">${escapeHtml(p.title)}</h3>
                  <p class="text-muted text-sm mb-3 line-clamp-2">${escapeHtml(p.excerpt)}</p>
                  <div class="flex flex-wrap items-center gap-3">
                    <div class="flex flex-wrap gap-1">${p.tags.map(t => `<span class="text-xs px-2 py-0.5 bg-surface text-muted rounded font-mono cursor-pointer hover:text-purple-400 transition-colors" onclick="event.stopPropagation(); window.location.hash='#/tag/${t}'">#${escapeHtml(t)}</span>`).join('')}</div>
                    <span class="text-xs text-muted font-mono">${p.readTime}</span>
                    <span class="text-xs text-muted font-mono">${p.date}</span>
                  </div>
                </div>
              </article>
            `).join('') : '<div class="text-center py-16"><p class="text-muted">暂无文章</p></div>'}
          </div>
        </section>
      `;
    }

    function renderPost(id) {
      const article = ARTICLES[id];
      const post = POSTS.find(p => p.id === id);
      if (!article || !post) return '<div class="text-center py-16"><p class="text-muted">文章不存在</p><a href="#/" class="text-purple-400 hover:underline mt-4 inline-block font-mono text-sm">→ back</a></div>';

      const relatedPosts = POSTS.filter(p => p.id !== id && p.tags.some(t => post.tags.includes(t))).slice(0, 3);

      return `
        <button onclick="window.history.back()" class="flex items-center gap-2 text-sm text-muted hover:text-text transition-colors mb-8 group" aria-label="返回">
          <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          back
        </button>

        <article class="mb-12">
          <div class="flex flex-wrap items-center gap-3 mb-6 text-xs font-mono text-muted">
            <span>${post.date}</span><span class="text-border">|</span><span>${post.readTime}</span><span class="text-border">|</span><span>${post.author}</span>
          </div>
          <h1 class="text-3xl md:text-5xl font-bold mb-8 tracking-tight leading-tight">${escapeHtml(post.title)}</h1>
          <div class="flex flex-wrap gap-2 mb-8">
            ${post.tags.map(t => `<button class="px-3 py-1 rounded-full text-xs font-medium font-mono border border-border text-muted hover:tag-hover transition-all duration-300 cursor-pointer" onclick="window.location.hash='#/tag/${t}'">#${escapeHtml(t)}</button>`).join('')}
          </div>
          <div class="border-t border-border"></div>
        </article>

        <section class="text-text leading-relaxed space-y-6 mb-12 text-base" style="line-height: 1.8;">
          ${article.content}
        </section>

        <section class="mb-12">
          <h2 class="text-xs font-mono text-muted uppercase tracking-wider mb-6 flex items-center gap-2"><span class="w-1 h-4 bg-cyan-500 rounded-full"></span>related</h2>
          ${relatedPosts.length > 0 ? `
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
              ${relatedPosts.map(p => `
                <article class="card-hover bg-surface border border-border rounded-xl p-5 cursor-pointer group" onclick="window.location.hash='#/post/${p.id}'">
                  <h3 class="font-semibold text-text mb-2 group-hover:text-purple-400 transition-colors line-clamp-2">${escapeHtml(p.title)}</h3>
                  <p class="text-xs text-muted line-clamp-2 mb-3">${escapeHtml(p.excerpt)}</p>
                  <span class="text-xs text-muted font-mono">${p.date}</span>
                </article>
              `).join('')}
            </div>
          ` : '<p class="text-muted text-sm">暂无相关文章</p>'}
        </section>
      `;
    }

    function renderAbout() {
      return `
        <section class="mb-16">
          <div class="text-center mb-12">
            <div class="w-24 h-24 mx-auto mb-6 bg-gradient-to-br from-purple-500 via-cyan-500 to-pink-500 rounded-2xl flex items-center justify-center text-white text-3xl font-bold shadow-lg animate-float">K</div>
            <h1 class="text-3xl md:text-5xl font-bold mb-4 tracking-tight leading-tight">Hi, I'm <span class="text-gradient">King Cobra</span></h1>
            <p class="text-lg text-muted max-w-xl mx-auto leading-relaxed">开发者 · 开源爱好者 · 终身学习者</p>
          </div>
        </section>

        <div class="grid md:grid-cols-3 gap-8">
          <div class="md:col-span-2 space-y-8">
            <section class="bg-surface border border-border rounded-xl p-8">
              <h2 class="text-xs font-mono text-muted uppercase tracking-wider mb-6 flex items-center gap-2"><span class="w-1 h-4 bg-purple-500 rounded-full"></span>about</h2>
              <div class="space-y-4 text-muted leading-relaxed">
                <p>你好！欢迎来到我的技术博客。</p>
                <p>我相信 <span class="text-text font-medium">"输出是最好的学习方式"</span>。通过写作，我能更系统地整理思路，发现自己理解上的盲区，同时也希望能帮助到正在学习相关技术的朋友。</p>
                <p>这个博客主要关注 <span class="text-purple-400">前端开发</span>、<span class="text-cyan-400">后端架构</span>、<span class="text-pink-400">DevOps</span> 以及 <span class="text-yellow-400">工程实践</span> 等领域。</p>
              </div>
            </section>

            <section class="bg-surface border border-border rounded-xl p-8">
              <h2 class="text-xs font-mono text-muted uppercase tracking-wider mb-6 flex items-center gap-2"><span class="w-1 h-4 bg-cyan-500 rounded-full"></span>stack</h2>
              <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                ${['TypeScript', 'React', 'Vue', 'Node.js', 'Astro', 'Tailwind CSS', 'Docker', 'PostgreSQL', 'Redis'].map(t => `
                  <div class="flex items-center gap-2 p-3 bg-bg border border-border rounded-lg hover:border-purple-500/50 transition-colors">
                    <svg class="w-4 h-4 text-purple-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                    <span class="text-sm text-text">${t}</span>
                  </div>
                `).join('')}
              </div>
            </section>
          </div>

          <div class="space-y-6">
            <section class="bg-surface border border-border rounded-xl p-6">
              <h3 class="text-xs font-mono text-muted uppercase tracking-wider mb-4 flex items-center gap-2"><span class="w-1 h-4 bg-pink-500 rounded-full"></span>contact</h3>
              <div class="space-y-3">
                <a href="mailto:hello@kingcobra.dev" class="flex items-center gap-3 text-sm text-muted hover:text-purple-400 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                  hello@kingcobra.dev
                </a>
                <a href="https://github.com/k4xus" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 text-sm text-muted hover:text-purple-400 transition-colors">
                  <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                  github.com/k4xus
                </a>
              </div>
            </section>
            <section class="bg-surface border border-border rounded-xl p-6">
              <h3 class="text-xs font-mono text-muted uppercase tracking-wider mb-4 flex items-center gap-2"><span class="w-1 h-4 bg-green-500 rounded-full"></span>stats</h3>
              <div class="space-y-4">
                <div class="flex justify-between"><span class="text-sm text-muted">Posts</span><span class="text-lg font-bold text-text font-mono">${POSTS.length}</span></div>
                <div class="flex justify-between"><span class="text-sm text-muted">Tags</span><span class="text-lg font-bold text-text font-mono">${getAllTags().length}</span></div>
                <div class="flex justify-between"><span class="text-sm text-muted">Last Update</span><span class="text-sm font-medium text-text font-mono">${POSTS[0].date}</span></div>
              </div>
            </section>
          </div>
        </div>
      `;
    }

    // ===== Router =====
    function render() {
      const hash = window.location.hash || '#/';
      const main = document.getElementById('main-content');
      let page, title;

      document.querySelectorAll('[data-nav]').forEach(el => {
        const nav = el.getAttribute('data-nav');
        if (nav === 'home' && (hash === '#/' || hash.startsWith('#/post') || hash.startsWith('#/tag'))) {
          el.className = 'px-4 py-2 rounded-lg text-sm font-medium text-purple-400 bg-purple-500/10';
        } else if (nav === 'about' && hash === '#/about') {
          el.className = 'px-4 py-2 rounded-lg text-sm font-medium text-purple-400 bg-purple-500/10';
        } else {
          el.className = 'px-4 py-2 rounded-lg text-sm font-medium text-muted hover:text-text hover:bg-surface transition-colors';
        }
      });

      if (hash === '#/' || hash === '#') { page = renderHome(null); title = 'King Cobra — Code, create, conquer.'; }
      else if (hash.startsWith('#/post/')) { const id = hash.replace('#/post/', ''); const post = POSTS.find(p => p.id === id); page = renderPost(id); title = post ? `${post.title} | King Cobra` : 'Not Found | King Cobra'; }
      else if (hash.startsWith('#/tag/')) { const tag = hash.replace('#/tag/', ''); page = renderHome(unescape(tag)); title = `#${tag} | King Cobra`; }
      else if (hash === '#/about') { page = renderAbout(); title = 'About | King Cobra'; }
      else { page = renderHome(null); title = 'King Cobra — Code, create, conquer.'; }

      main.innerHTML = `<div class="animate-fade-in-up">${page}</div>`;
      document.title = title;
      window.scrollTo(0, 0);
    }

    window.addEventListener('hashchange', render);
    window.addEventListener('DOMContentLoaded', render);
    document.addEventListener('click', (e) => { const m = document.getElementById('mobile-menu'); if (m && !m.classList.contains('hidden') && e.target.closest('a')) { m.classList.add('hidden'); } });
  </script>
</body>
</html>
